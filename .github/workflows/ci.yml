# ─────────────────────────────────────────────────────
# CI — Pull Request 검증 파이프라인
# ─────────────────────────────────────────────────────
# 트리거: dev, main 브랜치 PR 생성/업데이트 시
# 작업: 타입 검사 → 린트 → 빌드 테스트

name: 🔍 CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 타입 체크 + 린트 ───────────────────────────────
  quality:
    name: 🧹 Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔎 TypeScript type check
        run: npm run type-check

      - name: 🧹 ESLint
        run: npm run lint

  # ─── 빌드 테스트 ────────────────────────────────────
  build:
    name: 🔨 Build Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_URL: https://biblecanvas.kr
          NEXT_PUBLIC_KAKAO_JS_KEY: dummy_key_for_build
